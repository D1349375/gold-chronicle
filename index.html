<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金史紀 | 黃金走勢與事件追蹤</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #f5f5f5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            margin-bottom: 30px;
        }
        .search-box {
            background: #1e1e1e;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
            width: 100%;
            max-width: 900px;
        }
        input[type="date"], input[type="text"] {
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            outline: none;
        }
        input:focus { border-color: #FFD700; }
        button {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #FFD700, #DAA520);
            color: #121212;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,215,0,0.2); }
        .chart-container {
            width: 100%;
            max-width: 960px;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        table {
            width: 100%;
            max-width: 960px;
            border-collapse: collapse;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        th { color: #FFD700; background: #111; }
        .price-text { color: #4CAF50; font-weight: bold; }

        /* ✨ 新增：彈出視窗 (Modal) 的 CSS 設計 ✨ */
        .modal-overlay {
            display: none; /* 預設隱藏 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px); /* 背景模糊效果 */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #DAA520;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8), 0 0 20px rgba(218, 165, 32, 0.2);
            max-width: 500px;
            width: 85%;
            text-align: center;
            position: relative;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }
        /* 當 modal 顯示時的動畫類別 */
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #888;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { color: #FFD700; }
        .modal-date { color: #888; font-size: 1.1rem; margin-bottom: 10px; }
        .modal-price { color: #4CAF50; font-size: 2rem; font-weight: bold; margin: 10px 0 20px 0; font-family: monospace; }
        .modal-event { color: #fff; font-size: 1.3rem; line-height: 1.6; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

    <h1>金史紀 (GoldChronicle)</h1>
    
    <div class="search-box">
        <input type="date" id="startDate">
        <span>至</span>
        <input type="date" id="endDate">
        <input type="text" id="keyword" placeholder="搜尋事件關鍵字">
        
        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="onlyEvents" onchange="fetchData()"> 只顯示大事件
        </label>

        <button onclick="fetchData()">查詢走勢</button>
    </div>

    <div class="chart-container">
        <canvas id="priceChart"></canvas>
    </div>

    <table>
        <thead>
            <tr>
                <th>日期</th>
                <th>黃金價格 (USD)</th>
                <th>潛在影響事件</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>

    <div id="eventModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-date" id="modalDate">202X-XX-XX</div>
            <div class="modal-price" id="modalPrice">$0.00</div>
            <div class="modal-event" id="modalEvent">載入中...</div>
        </div>
    </div>

    <script>
        let priceChart = null;

        window.onload = fetchData;

        async function fetchData() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const keyword = document.getElementById('keyword').value.trim().toLowerCase();
            const onlyEvents = document.getElementById('onlyEvents').checked;

            const params = new URLSearchParams();
            if (startDate) params.append('startDate', startDate);
            if (endDate) params.append('endDate', endDate);

            try {
                const response = await fetch(`/api/gold?${params.toString()}`);
                const fullData = await response.json();
                
                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = ''; 

                if (fullData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">此區間查無黃金資料</td></tr>';
                    if (priceChart) priceChart.destroy();
                    return;
                }

                const tableData = fullData.filter(row => {
                    const eventText = (row.event || "").toLowerCase();
                    let match = true;
                    if (onlyEvents && !row.event) match = false;
                    if (keyword && !eventText.includes(keyword)) match = false;
                    return match;
                });

                tableData.forEach(row => {
                    const tr = document.createElement('tr');
                    let displayEvent = row.event || '-';
                    if (keyword && row.event) {
                        const reg = new RegExp(`(${keyword})`, "gi");
                        displayEvent = row.event.replace(reg, `<span style="color:#FF4500; font-weight:bold;">$1</span>`);
                    }

                    tr.innerHTML = `
                        <td>${row.date}</td>
                        <td class="price-text">$${row.price.toFixed(2)}</td>
                        <td>${displayEvent}</td>
                    `;
                    tbody.appendChild(tr);
                });

                renderChart(fullData, keyword);
            } catch (e) {
                console.error("API 連線失敗", e);
            }
        }

        function renderChart(fullData, keyword) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (priceChart) priceChart.destroy();

            const pointRadii = fullData.map(d => {
                const eventText = (d.event || "").toLowerCase();
                if (keyword && eventText.includes(keyword)) return 7;  
                if (d.event) return 4;                                
                return 2;                                             
            });

            const pointBgColors = fullData.map(d => {
                const eventText = (d.event || "").toLowerCase();
                if (keyword && eventText.includes(keyword)) return '#FFFFFF'; 
                if (d.event) return '#FFD700';                                
                return '#5A4D1A';                                             
            });

            const pointBorderColors = fullData.map(d => {
                const eventText = (d.event || "").toLowerCase();
                if (keyword && eventText.includes(keyword)) return '#DAA520'; 
                if (d.event) return '#121212';                                
                return 'transparent';                                         
            });

            const pointBorderWidths = fullData.map(d => {
                const eventText = (d.event || "").toLowerCase();
                if (keyword && eventText.includes(keyword)) return 3; 
                if (d.event) return 2;                                
                return 0;                                             
            });

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: fullData.map(d => d.date),
                    datasets: [{
                        label: '黃金價格走勢 (USD)',
                        data: fullData.map(d => d.price),
                        borderColor: '#FFD700',
                        backgroundColor: 'rgba(255, 215, 0, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1,
                        pointRadius: pointRadii,
                        pointBackgroundColor: pointBgColors,
                        pointBorderColor: pointBorderColors,
                        pointBorderWidth: pointBorderWidths,
                        pointHoverRadius: 8,
                        pointHoverBackgroundColor: '#FFFFFF',
                        pointHoverBorderColor: '#DAA520',
                        pointHitRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    // ✨ 新增：點擊圖表事件偵測 ✨
                    onClick: (event, elements) => {
                        if (elements.length > 0) {
                            const dataIndex = elements[0].index;
                            const clickedData = fullData[dataIndex];
                            
                            // 只有當這天「有事件」時，才彈出視窗
                            if (clickedData.event) {
                                openModal(clickedData);
                            }
                        }
                    },
                    scales: {
                        x: { ticks: { color: '#888' }, grid: { color: '#333' } },
                        y: { ticks: { color: '#888' }, grid: { color: '#333' } }
                    },
                    plugins: { 
                        legend: { labels: { color: '#fff' } },
                        tooltip: {
                            callbacks: {
                                afterLabel: function(context) {
                                    const event = fullData[context.dataIndex].event;
                                    // 加入小提示，告訴使用者可以點擊
                                    return event ? ['事件: ' + event, '(點擊資料點查看詳情)'] : '';
                                }
                            }
                        }
                    }
                }
            });
        }

        // ✨ 修改點：動態渲染事件標題與詳細解說 ✨
        function openModal(data) {
            document.getElementById('modalDate').innerText = data.date;
            document.getElementById('modalPrice').innerText = '$' + data.price.toFixed(2);
            
            // 將原本只有標題的內容，升級為「粗體標題 + 段落解說」
            const eventTitle = `<strong style="color: #FFD700; font-size: 1.2rem; display: block; margin-bottom: 15px;">${data.event}</strong>`;
            const eventDetail = `<span style="font-size: 1rem; color: #ddd;">${data.detail || '此事件暫無詳細背景說明。'}</span>`;
            
            document.getElementById('modalEvent').innerHTML = eventTitle + eventDetail;
            
            const modal = document.getElementById('eventModal');
            modal.style.display = 'flex'; 
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        function closeModal(event) {
            // 如果有傳入 event (代表是點擊背景)，確認點擊的是不是黑底(overlay)
            if (event && event.target.id !== 'eventModal') return;
            
            const modal = document.getElementById('eventModal');
            modal.classList.remove('show');
            // 等待淡出動畫結束後再隱藏
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }
    </script>
</body>
</html>
